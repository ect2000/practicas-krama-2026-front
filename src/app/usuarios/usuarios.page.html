<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title class="font-bold tracking-wide">Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-4 md:p-6">

    <div class="flex justify-end mb-4">
      <ion-button shape="round" color="primary" class="font-bold shadow-lg h-12 px-4">
        <ion-icon slot="start" name="add-outline"></ion-icon>
        Añadir Usuario
      </ion-button>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
      
      <div class="hidden md:grid grid-cols-12 gap-4 bg-gray-50 p-5 border-b border-gray-200 text-gray-500 font-bold uppercase text-xs tracking-wider">
        <div class="col-span-5">Nombre y Apellidos</div>
        <div class="col-span-7">Correo Electrónico</div>
      </div>

      <div class="flex flex-col">
        @for (usuario of usuarios; track usuario.id) {
          <div class="grid grid-cols-1 md:grid-cols-12 gap-2 md:gap-4 p-5 border-b border-gray-100 hover:bg-gray-50 transition-colors items-center">
            <div class="col-span-1 md:col-span-5 font-bold text-gray-800 text-lg md:text-base">
              {{ usuario.nombre }} {{ usuario.apellidos }}
            </div>
            <div class="col-span-1 md:col-span-7 text-gray-500">
              <span class="md:hidden font-bold mr-1 text-gray-400">Email:</span>
              {{ usuario.email }}
            </div>
          </div>
        } @empty {
          <div class="flex flex-col items-center justify-center p-16 text-center">
            <ion-icon name="people-outline" class="text-7xl text-gray-300 mb-4"></ion-icon>
            <h3 class="text-2xl font-bold text-gray-700">No hay usuarios</h3>
            <p class="text-gray-500 mt-2 text-lg">Actualmente no hay registros en la base de datos.</p>
          </div>
        }
      </div>

    </div>

  </div>
</ion-content>
