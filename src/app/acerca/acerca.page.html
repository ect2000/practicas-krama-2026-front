<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Acerca de mí</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngIf="usuarioActual">
    <ion-card-header>
      <ion-card-title>Mi Perfil</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <h3>Nombre Completo</h3>
            <p>{{ usuarioActual.nombre }} {{ usuarioActual.apellidos }}</p>
          </ion-label>
        </ion-item>
        
        <ion-item>
          <ion-label>
            <h3>Correo Electrónico</h3>
            <p>{{ usuarioActual.email }}</p>
          </ion-label>
        </ion-item>

        <ion-item>
          <ion-label>
            <h3>Teléfono</h3>
            <p>{{ usuarioActual.telefono }}</p>
          </ion-label>
        </ion-item>

        <ion-item lines="none">
          <ion-label>
            <h3>Rol</h3>
            <p><strong>{{ usuarioActual.rol }}</strong></p>
          </ion-label>
        </ion-item>
      </ion-list>

      <ion-button expand="block" color="danger" class="ion-margin-top" (click)="cerrarSesion()">
        Cerrar Sesión
      </ion-button>
    </ion-card-content>
  </ion-card>

  <div *ngIf="!usuarioActual" class="ion-text-center ion-padding-top">
    <p>No hay ninguna sesión iniciada.</p>
    <ion-button expand="block" routerLink="/login">Ir a Iniciar Sesión</ion-button>
  </div>

</ion-content>
