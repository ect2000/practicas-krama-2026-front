<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title class="font-bold tracking-wide">Informes y Estadísticas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    
    <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Resumen de Actividad</h1>
        <p class="text-gray-500">Visualiza el rendimiento y descarga los registros de trabajo.</p>
      </div>
      <ion-button color="success" shape="round" class="font-bold h-12 px-4" (click)="descargarExcel()">
        <ion-icon slot="start" name="document-text-outline"></ion-icon>
        Exportar Excel
      </ion-button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 flex flex-col items-center">
        <h2 class="text-lg font-bold text-gray-700 mb-4 w-full text-center">Horas por Proyecto</h2>
        <div class="w-full max-w-[300px]">
          <canvas baseChart
            [type]="'pie'"
            [datasets]="pieChartDatasets"
            [labels]="pieChartLabels"
            [options]="pieChartOptions">
          </canvas>
        </div>
      </div>
      
      <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 flex flex-col items-center">
        <h2 class="text-lg font-bold text-gray-700 mb-4 w-full text-center">Horas por Cliente</h2>
        <div class="w-full h-[300px] flex items-end"> <canvas baseChart
            [type]="'bar'"
            [datasets]="barChartDatasets"
            [labels]="barChartLabels"
            [options]="barChartOptions">
          </canvas>
        </div>
      </div>

    </div>

  </div>
</ion-content>
