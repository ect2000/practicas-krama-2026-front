<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/ajustes"></ion-back-button>
    </ion-buttons>
    <ion-title>Cambiar Contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-900 p-4">

    <ion-card class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-2 md:p-4 m-0">

      <ion-card-header class="text-center mb-2">
        <ion-card-title class="text-3xl font-extrabold text-gray-800 tracking-wide mt-4">Seguridad</ion-card-title>
        <ion-card-subtitle class="text-gray-500 text-base mt-2">Actualiza tu contraseña</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <div class="flex flex-col gap-5 mt-2">
          
          <div class="bg-gray-50 rounded-2xl border border-gray-200 px-4 py-2 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-200 transition-all">
            <ion-input
              label="Nueva contraseña"
              labelPlacement="floating"
              placeholder="Escribe la nueva contraseña"
              class="text-gray-800 font-medium"
              type="password"
              [(ngModel)]="nuevaPassword">
              <ion-icon slot="start" name="lock-open-outline" class="text-gray-400 mr-2 mt-2"></ion-icon>
            </ion-input>
          </div>

          <div class="bg-gray-50 rounded-2xl border border-gray-200 px-4 py-2 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-200 transition-all">
            <ion-input
              label="Repetir contraseña"
              labelPlacement="floating"
              placeholder="Vuelve a escribirla"
              class="text-gray-800 font-medium"
              type="password"
              [(ngModel)]="repetirPassword">
              <ion-icon slot="start" name="lock-closed-outline" class="text-gray-400 mr-2 mt-2"></ion-icon>
            </ion-input>
          </div>

          <div class="text-center mt-2">
            <ion-text color="danger" *ngIf="mensajeError">
              <p class="font-bold">{{ mensajeError }}</p>
            </ion-text>
            <ion-text color="success" *ngIf="mensajeExito">
              <p class="font-bold">{{ mensajeExito }}</p>
            </ion-text>
          </div>

          <ion-button
            expand="block"
            shape="round"
            class="mt-6 mb-4 h-14 text-lg font-bold"
            color="primary"
            (click)="guardarContrasena()">
            Actualizar Contraseña
          </ion-button>
          
        </div>
      </ion-card-content>

    </ion-card>

  </div>
</ion-content>
