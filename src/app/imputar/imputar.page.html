<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Añadir Imputación</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <ion-list>
    <ion-item>
      <ion-label position="stacked">ID del Proyecto</ion-label>
      <ion-input type="number" [(ngModel)]="nuevaImputacion.proyecto.id" placeholder="Ej. 1"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Fecha</ion-label>
      <ion-input type="date" [(ngModel)]="nuevaImputacion.fecha"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Horas dedicadas</ion-label>
      <ion-input type="number" [(ngModel)]="nuevaImputacion.horas" placeholder="Ej. 4"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Anotaciones / Comentarios</ion-label>
      <ion-textarea [(ngModel)]="nuevaImputacion.anotaciones" placeholder="¿Qué tareas has realizado?"></ion-textarea>
    </ion-item>
  </ion-list>

  <ion-button expand="block" class="ion-margin-top" (click)="guardarImputacion()">
    Guardar Horas
  </ion-button>

</ion-content>
