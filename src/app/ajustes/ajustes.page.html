<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Ajustes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>
    <ion-list-header>
      <ion-label color="primary">Apariencia</ion-label>
    </ion-list-header>

    <ion-item>
      <ion-label>
        <h2>Modo Oscuro</h2>
        <p>Cambia los colores de la aplicación</p>
      </ion-label>
      
      <ion-toggle slot="end" [(ngModel)]="modoOscuro" (ionChange)="cambiarTema()"></ion-toggle>
    </ion-item>
  </ion-list>

</ion-content>
